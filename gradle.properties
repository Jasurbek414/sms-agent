# =============================================================================
# SMS Agent Platform - Gradle Properties
# Gradle build tizimi uchun global sozlamalar
# =============================================================================

# JVM xotira sozlamalari - katta loyihalar uchun optimallashtirilgan
org.gradle.jvmargs=-Xmx4096m -Dfile.encoding=UTF-8 -XX:+UseParallelGC -XX:MaxMetaspaceSize=512m

# AndroidX kutubxonalarini ishlatish
android.useAndroidX=true

# Kotlin kod uslubi - rasmiy standart
kotlin.code.style=official

# Non-transitive R class - har bir modul faqat o'z resurslarini ko'radi
android.nonTransitiveRClass=true

# Gradle parallel build - tezroq build qilish
org.gradle.parallel=true

# Gradle caching - qayta build-larni tezlashtirish
org.gradle.caching=true

# Gradle configuration cache
org.gradle.configuration-cache=true

# Kotlin incremental compilation
kotlin.incremental=true

# KSP incremental processing
ksp.incremental=true
ksp.incremental.log=true
