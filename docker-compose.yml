version: '3.8'

services:
  sms-agent-bridge:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sms-agent-bridge-container
    ports:
      - "8082:80"
    volumes:
      - ./backend:/var/www/html
    restart: always

