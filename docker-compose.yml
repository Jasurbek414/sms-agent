version: '3.8'

services:
  sms-agent-bridge:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sms-agent-bridge-container
    ports:
      - "8082:80"
    volumes:
      - ./backend:/var/www/html
    restart: always

  smpp-server:
    build:
      context: ./smpp_server
      dockerfile: Dockerfile
    container_name: smpp-server-container
    ports:
      - "2775:2775"
    environment:
      - PORT=2775
      - PHP_BACKEND_URL=http://sms-agent-bridge-container/send
      - API_KEY=7e4cd8f3-72e2-4ed3-afcf-64274679cd86
    depends_on:
      - sms-agent-bridge
    restart: always

  cloudflare-tunnel:
    image: cloudflare/cloudflared:latest
    container_name: cloudflare-tunnel-container
    command: tunnel --no-autoupdate run --token eyJhIjoiMDI5NDc1MzY0YWNjNDEzY2Q2Y2YzNWVkOGU0MjEzNGIiLCJ0IjoiOGUwZTYwNWYtYmVkMC00OWQ2LTllNjAtZDk4ZWU4YTczYWY4IiwicyI6Ik5qTTJZakZqWWpRdFlURXpaUzAwWW1RMUxUazFOakl0WW1Sak5EWTJOamxqT1RGaSJ9
    restart: always
    extra_hosts:
      - "host.docker.internal:host-gateway"
